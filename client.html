<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SignalPro • Cliente</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
        body{background:#0A0A0A;min-height:100vh;padding:20px}
        .container{max-width:600px;margin:0 auto}
        .header{text-align:center;margin-bottom:25px}
        .header h1{font-size:1.8rem;font-weight:800;color:#FF8C00}
        .header p{color:#CCCCCC;font-size:0.75rem}
        .login-box{background:#1A1A1A;border-radius:16px;padding:35px 25px;border:1px solid #FF8C00}
        .input-group{margin-bottom:20px}
        .input-group label{display:block;color:#FF8C00;margin-bottom:8px;font-size:0.8rem}
        .input-group input{width:100%;padding:14px;background:#0A0A0A;border:1px solid #333;border-radius:10px;color:#FFF}
        .btn{width:100%;padding:14px;background:#FF8C00;color:#000;border:none;border-radius:10px;font-weight:700;cursor:pointer;margin-top:10px}
        .dashboard{display:none}
        .dashboard.active{display:block}
        .top-bar{background:#1A1A1A;border-radius:12px;padding:15px 20px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
        .welcome-box{display:flex;align-items:center;gap:10px}
        .welcome-box i{font-size:1.5rem;color:#FF8C00}
        .welcome-box h2{color:#FFF;font-size:1.1rem}
        .logout-btn{background:transparent;border:1px solid #FF4444;color:#FF4444;padding:8px 16px;border-radius:25px;cursor:pointer;font-size:0.8rem}
        .signal-card{background:#1A1A1A;border-radius:20px;padding:25px;margin-bottom:20px;text-align:center;border:1px solid #333}
        .signal-value{font-size:2.2rem;font-weight:800;padding:15px 25px;border-radius:50px;display:inline-block;margin-bottom:15px}
        .signal-value.call{background:#00AA55;color:#FFF;box-shadow:0 0 15px rgba(0,170,85,0.4)}
        .signal-value.put{background:#FF4444;color:#FFF;box-shadow:0 0 15px rgba(255,68,68,0.4)}
        .signal-value.wait{background:#FF8C00;color:#000}
        .confidence-bar{height:6px;background:#2a2a3e;border-radius:3px;margin-top:15px;overflow:hidden}
        .confidence-fill{height:100%;width:0%;transition:width 0.3s;background:#00AA55}
        .preco{margin-top:15px;padding:10px;background:#0A0A0A;border-radius:10px}
        .preco span{color:#FFF;font-size:1.2rem;font-weight:600}
        .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
        .stat-card{background:#1A1A1A;border-radius:16px;padding:15px;text-align:center;border:1px solid #2a3a5e}
        .stat-card i{font-size:1.5rem;color:#FF8C00;margin-bottom:8px}
        .stat-card .value{font-size:1.6rem;font-weight:800;color:#FFF}
        .stat-card.acertos .value{color:#00AA55}
        .stat-card.erros .value{color:#FF4444}
        .stat-card.lucro .value{color:#FF8C00}
        .analysis-card{background:#0A0A0A;border-radius:12px;padding:15px;border-left:3px solid #FF8C00}
        .analysis-card p{color:#CCC;font-size:0.75rem;line-height:1.5}
        .status-bar{background:#1A1A1A;border-radius:10px;padding:8px 15px;margin-bottom:20px;display:flex;justify-content:space-between;font-size:0.7rem;color:#8ba0c0}
        footer{text-align:center;margin-top:20px;color:#666;font-size:0.65rem}
        .error-message{color:#FF4444;text-align:center;margin-top:10px}
        .hidden{display:none}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-chart-line"></i> SignalPro</h1>
        <p>Painel do Cliente • Sinais em Tempo Real</p>
    </div>

    <div id="loginPanel">
        <div class="login-box">
            <div style="text-align:center;margin-bottom:20px"><i class="fas fa-user-astronaut" style="font-size:2rem;color:#FF8C00"></i><h3 style="color:#FFF">Acesso do Cliente</h3></div>
            <div class="input-group"><label>Email</label><input type="email" id="email" placeholder="seu@email.com"></div>
            <div class="input-group"><label>Senha</label><input type="password" id="password" placeholder="••••••••"></div>
            <div class="error-message" id="loginError"></div>
            <button class="btn" onclick="loginCliente()">Entrar</button>
            <p style="color:#666;font-size:0.65rem;text-align:center;margin-top:15px">Use as credenciais fornecidas pelo administrador</p>
        </div>
    </div>

    <div id="dashboard" class="dashboard">
        <div class="top-bar">
            <div class="welcome-box"><i class="fas fa-user-circle"></i><h2>Olá, <span id="clienteNome">Cliente</span></h2></div>
            <button class="logout-btn" onclick="logoutCliente()"><i class="fas fa-sign-out-alt"></i> Sair</button>
        </div>
        <div class="status-bar"><span><i class="fas fa-circle"></i> <span id="connStatus">Conectado</span></span><span><i class="fas fa-clock"></i> <span id="currentTime"></span></span><span><i class="fas fa-chart-line"></i> EUR/USD</span></div>

        <div class="signal-card">
            <div id="sinalValue" class="signal-value wait">AGUARDANDO</div>
            <div class="confidence-bar"><div id="confidenceFill" class="confidence-fill"></div></div>
            <div class="preco"><span id="precoAtual">$---</span> <small>EUR/USD</small></div>
        </div>

        <div class="stats-grid">
            <div class="stat-card acertos"><i class="fas fa-check-circle"></i><div class="value" id="acertos">0</div><div>ACERTOS</div></div>
            <div class="stat-card erros"><i class="fas fa-times-circle"></i><div class="value" id="erros">0</div><div>ERROS</div></div>
            <div class="stat-card lucro"><i class="fas fa-coins"></i><div class="value" id="lucro">R$0</div><div>LUCRO TOTAL</div></div>
        </div>

        <div class="analysis-card"><p id="analiseText">Aguardando análise do robô...</p></div>
        <footer>Dados em tempo real • Próximo sinal em alguns segundos</footer>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://wedhebcoxljyeoxhgaob.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlZGhlYmNveGxqeWVveGhnYW9iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4OTgwNDgsImV4cCI6MjA5MjQ3NDA0OH0._Xnqxp6YSazOK37xP5qSi5gOuThvqGm5Kw_xmWZU8XQ';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let clienteAtual = null, channel = null, ultimoPreco = 0;

    async function loginCliente() {
        const email = document.getElementById('email').value;
        const senha = document.getElementById('password').value;
        const { error } = await supabase.auth.signInWithPassword({ email, password: senha });
        if (error) { document.getElementById('loginError').innerText = 'Email ou senha incorretos'; return; }
        const { data: cliente } = await supabase.from('clientes').select('*').eq('email', email).single();
        if (!cliente || !cliente.ativo) { alert('Cliente inativo'); await supabase.auth.signOut(); return; }
        clienteAtual = cliente;
        document.getElementById('clienteNome').innerText = cliente.nome || cliente.email.split('@')[0];
        document.getElementById('loginPanel').style.display = 'none';
        document.getElementById('dashboard').classList.add('active');
        carregarEstatisticas();
        conectarBroadcast();
        iniciarRelogio();
        if(Notification.permission==='default') Notification.requestPermission();
    }

    function logoutCliente() { if(channel) channel.close(); supabase.auth.signOut(); location.reload(); }
    function iniciarRelogio() { setInterval(()=>{document.getElementById('currentTime').innerHTML=new Date().toLocaleTimeString('pt-BR');},1000); }

    function conectarBroadcast() {
        channel = new BroadcastChannel('signalpro');
        channel.onmessage = (e) => {
            if(e.data.type === 'SINAL') {
                const sinal = e.data.sinal, conf = e.data.confianca, preco = e.data.preco;
                ultimoPreco = preco;
                const el = document.getElementById('sinalValue');
                el.innerHTML = sinal==='CALL'?'📈 CALL (COMPRA)':(sinal==='PUT'?'📉 PUT (VENDA)':'⏳ AGUARDAR');
                el.className = `signal-value ${sinal.toLowerCase()}`;
                document.getElementById('confidenceFill').style.width = `${conf}%`;
                document.getElementById('precoAtual').innerHTML = `$${preco.toFixed(5)}`;
                document.getElementById('analiseText').innerHTML = `🔍 Sinal ${sinal} com ${conf}% de confiança. ${conf>=85?'Alta probabilidade de acerto.':'Confiança moderada.'}`;
                if(sinal!=='WAIT' && conf>=85) setTimeout(()=>finalizarOperacao(sinal,conf,preco), 15*60*1000);
            }
        };
    }

    async function finalizarOperacao(sinal, confianca, precoEntrada) {
        const precoSaida = ultimoPreco;
        const invest = clienteAtual.investimento_operacao || 50, payout = clienteAtual.payout_percent || 85;
        let resultado = '', lucro = 0;
        if(sinal==='CALL') { resultado = precoSaida > precoEntrada ? 'ACERTO' : 'ERRO'; lucro = resultado==='ACERTO' ? invest*(payout/100) : -invest; }
        else { resultado = precoSaida < precoEntrada ? 'ACERTO' : 'ERRO'; lucro = resultado==='ACERTO' ? invest*(payout/100) : -invest; }
        await supabase.from('historico_sinais').insert({ cliente_id:clienteAtual.id, par:'EURUSD', timeframe:'m15', sinal, confianca, preco_entrada:precoEntrada, preco_saida:precoSaida, resultado, lucro });
        const { data: stats } = await supabase.from('estatisticas').select('*').eq('cliente_id',clienteAtual.id).eq('timeframe','m15').single();
        if(stats) await supabase.from('estatisticas').update({ acertos:stats.acertos+(resultado==='ACERTO'?1:0), erros:stats.erros+(resultado==='ERRO'?1:0), lucro_total:(stats.lucro_total||0)+lucro }).eq('id',stats.id);
        carregarEstatisticas();
    }

    async function carregarEstatisticas() {
        if(!clienteAtual) return;
        const { data: stats } = await supabase.from('estatisticas').select('*').eq('cliente_id',clienteAtual.id).eq('timeframe','m15').single();
        if(stats) {
            document.getElementById('acertos').innerText = stats.acertos || 0;
            document.getElementById('erros').innerText = stats.erros || 0;
            document.getElementById('lucro').innerHTML = `R$ ${(stats.lucro_total || 0).toFixed(2)}`;
        }
    }
</script>
</body>
</html>

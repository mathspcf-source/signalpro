name: IQ Option Bot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install
        run: pip install -r requirements.txt
      
      - name: Run Bot
        env:
          IQ_EMAIL: ${{ secrets.IQ_EMAIL }}
          IQ_SENHA: ${{ secrets.IQ_SENHA }}
        run: python bot.py

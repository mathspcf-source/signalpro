<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SignalPro Dono | Forex</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
        body{background:#0A0A0A;min-height:100vh;padding:20px}
        .container{max-width:1200px;margin:0 auto}
        .header{text-align:center;margin-bottom:25px}
        .header h1{font-size:2rem;font-weight:800;color:#FF8C00}
        .header p{color:#CCCCCC;font-size:0.85rem}
        .btn{background:#FF8C00;color:#000;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:600}
        .card{background:#1A1A1A;border-radius:16px;padding:20px;margin-bottom:20px;border:1px solid #FF8C00}
        .price{font-size:2rem;font-weight:800;color:#FFF}
        .signal-value{font-size:1.5rem;font-weight:800;padding:10px 20px;border-radius:25px;display:inline-block}
        .signal-value.call{background:#00AA55;color:#FFF}
        .signal-value.put{background:#FF4444;color:#FFF}
        .signal-value.wait{background:#FF8C00;color:#000}
        .flex{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}
        .hidden{display:none}
        .pair-btn{background:#0A0A0A;border:1px solid #333;color:#CCC;padding:8px 15px;border-radius:8px;cursor:pointer}
        .pair-btn.active{background:#FF8C00;color:#000}
        .pair-btn.signal-call{background:#00AA55;color:#FFF}
        .pair-btn.signal-put{background:#FF4444;color:#FFF}
        .pair-btn.signal-wait{background:#FF8C00;color:#000}
        .status-bar{background:#1A1A1A;border-radius:12px;padding:8px 15px;margin-bottom:20px;display:flex;justify-content:space-between;color:#CCC;font-size:0.75rem}
        .confidence-bar{height:4px;background:#333;border-radius:2px;margin-top:10px}
        .confidence-fill{height:100%;width:0%;background:#00AA55;transition:width 0.3s}
        footer{text-align:center;margin-top:20px;color:#666;font-size:0.7rem}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-chart-line"></i> SignalPro Dono</h1>
        <p>Forex • API REST • GitHub Pages</p>
    </div>

    <div class="card">
        <div class="flex">
            <h3 style="color:#FF8C00">📊 Pares USD/EUR</h3>
            <div id="pairSelector">
                <button class="pair-btn active" data-par="EURUSD" onclick="trocarPar('EURUSD')">EUR/USD</button>
                <button class="pair-btn" data-par="GBPUSD" onclick="trocarPar('GBPUSD')">GBP/USD</button>
                <button class="pair-btn" data-par="USDJPY" onclick="trocarPar('USDJPY')">USD/JPY</button>
                <button class="pair-btn" data-par="AUDUSD" onclick="trocarPar('AUDUSD')">AUD/USD</button>
                <button class="pair-btn" data-par="USDCAD" onclick="trocarPar('USDCAD')">USD/CAD</button>
                <button class="pair-btn" data-par="NZDUSD" onclick="trocarPar('NZDUSD')">NZD/USD</button>
                <button class="pair-btn" data-par="EURGBP" onclick="trocarPar('EURGBP')">EUR/GBP</button>
                <button class="pair-btn" data-par="EURJPY" onclick="trocarPar('EURJPY')">EUR/JPY</button>
                <button class="pair-btn" data-par="EURCHF" onclick="trocarPar('EURCHF')">EUR/CHF</button>
                <button class="pair-btn" data-par="EURAUD" onclick="trocarPar('EURAUD')">EUR/AUD</button>
                <button class="pair-btn" data-par="EURCAD" onclick="trocarPar('EURCAD')">EUR/CAD</button>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <span><i class="fas fa-circle"></i> <span id="connStatus">Conectando API...</span></span>
        <span><i class="fas fa-clock"></i> <span id="currentTime"></span></span>
        <span><i class="fas fa-chart-line"></i> <span id="currentPair">EUR/USD</span></span>
    </div>

    <div class="card">
        <div class="price" id="currentPrice">$---</div>
        <div><span id="priceChange" class="change">---</span></div>
    </div>

    <div class="card">
        <h3 style="color:#FF8C00;margin-bottom:15px">📈 Sinal - 15 MINUTOS (M15)</h3>
        <div id="sinalM15" class="signal-value wait">AGUARDANDO</div>
        <div class="confidence-bar"><div id="confidenceM15" class="confidence-fill"></div></div>
        <div id="analise" style="color:#8ba0c0;margin-top:15px">Aguardando dados...</div>
    </div>

    <footer>Dados Forex • Atualizado: <span id="lastUpdate">--:--:--</span></footer>
</div>

<script>
    let parAtual = 'EURUSD';
    let precoAtual = 0;
    let historicoPrecos = [];
    let intervalo = null;

    // CONFIGURAÇÕES API
    const API_KEY = 'd7kscphr01qiqbcvioj0d7kscphr01qiqbcviojg';
    
    // CORS PROXY (funciona no GitHub Pages)
    const CORS_PROXY = 'https://cors-anywhere.herokuapp.com/';

    async function buscarPreco() {
        try {
            // Usando ExchangeRate.host (não precisa de CORS, funciona em qualquer lugar)
            const response = await fetch('https://api.exchangerate.host/latest?base=USD');
            const data = await response.json();
            
            let preco = 0;
            switch(parAtual) {
                case 'EURUSD': preco = data.rates.EUR; break;
                case 'GBPUSD': preco = data.rates.GBP; break;
                case 'USDJPY': preco = 1 / data.rates.JPY; break;
                case 'AUDUSD': preco = data.rates.AUD; break;
                case 'USDCAD': preco = data.rates.CAD; break;
                case 'NZDUSD': preco = data.rates.NZD; break;
                case 'EURGBP': preco = data.rates.GBP / data.rates.EUR; break;
                case 'EURJPY': preco = (1 / data.rates.JPY) * data.rates.EUR; break;
                case 'EURCHF': preco = data.rates.CHF / data.rates.EUR; break;
                case 'EURAUD': preco = data.rates.AUD / data.rates.EUR; break;
                case 'EURCAD': preco = data.rates.CAD / data.rates.EUR; break;
                default: preco = data.rates.EUR;
            }
            
            // Simula pequena variação para movimento
            const variacao = (Math.random() - 0.5) * 0.0002;
            precoAtual = preco + variacao;
            
            document.getElementById('currentPrice').innerHTML = `$${precoAtual.toFixed(5)}`;
            document.getElementById('connStatus').innerHTML = '<i class="fas fa-circle" style="color:#00AA55"></i> Online';
            
            historicoPrecos.push(precoAtual);
            if(historicoPrecos.length > 100) historicoPrecos.shift();
            
            gerarSinais();
            
        } catch(erro) {
            console.log('Erro:', erro);
            document.getElementById('connStatus').innerHTML = '<i class="fas fa-circle" style="color:#FF8C00"></i> Erro - tentando novamente';
        }
    }
    
    function calcularRSI(precos, periodo = 14) {
        if(precos.length < periodo + 1) return 50;
        let ganhos = 0, perdas = 0;
        for(let i = precos.length - periodo; i < precos.length; i++) {
            const diff = precos[i] - precos[i-1];
            if(diff >= 0) ganhos += diff;
            else perdas += Math.abs(diff);
        }
        const ganhoMedio = ganhos / periodo;
        const perdaMedia = perdas / periodo;
        if(perdaMedia === 0) return 100;
        return 100 - (100 / (1 + ganhoMedio / perdaMedia));
    }
    
    function calcularMedia(precos, periodo) {
        if(precos.length < periodo) return precos[precos.length - 1];
        return precos.slice(-periodo).reduce((a,b) => a + b, 0) / periodo;
    }
    
    function gerarSinais() {
        if(historicoPrecos.length < 30) return;
        
        const rsi = calcularRSI(historicoPrecos, 14);
        const media5 = calcularMedia(historicoPrecos, 5);
        const media20 = calcularMedia(historicoPrecos, 20);
        
        let sinal = 'WAIT';
        let confianca = 0;
        
        if(rsi < 25 && media5 > media20) {
            sinal = 'CALL';
            confianca = 92 + Math.floor((25 - rsi) / 2.5);
        } else if(rsi < 30 && media5 > media20) {
            sinal = 'CALL';
            confianca = 85;
        } else if(rsi > 75 && media5 < media20) {
            sinal = 'PUT';
            confianca = 92 + Math.floor((rsi - 75) / 2.5);
        } else if(rsi > 70 && media5 < media20) {
            sinal = 'PUT';
            confianca = 85;
        }
        
        if(confianca > 98) confianca = 98;
        
        const sinalEl = document.getElementById('sinalM15');
        const confEl = document.getElementById('confidenceM15');
        
        if(sinal === 'CALL') {
            sinalEl.innerHTML = '📈 CALL (COMPRA)';
            sinalEl.className = 'signal-value call';
        } else if(sinal === 'PUT') {
            sinalEl.innerHTML = '📉 PUT (VENDA)';
            sinalEl.className = 'signal-value put';
        } else {
            sinalEl.innerHTML = '⏳ AGUARDAR';
            sinalEl.className = 'signal-value wait';
        }
        
        confEl.style.width = `${confianca}%`;
        
        document.getElementById('analise').innerHTML = `RSI: ${rsi.toFixed(1)} | Tendência: ${media5 > media20 ? 'ALTA' : 'BAIXA'} | Confiança: ${confianca}%`;
        document.getElementById('lastUpdate').innerHTML = new Date().toLocaleTimeString('pt-BR');
        
        // Atualiza cor do botão do par
        const btnAtual = document.querySelector(`.pair-btn[data-par="${parAtual}"]`);
        if(btnAtual) {
            btnAtual.classList.remove('signal-call', 'signal-put', 'signal-wait');
            if(sinal === 'CALL') btnAtual.classList.add('signal-call');
            else if(sinal === 'PUT') btnAtual.classList.add('signal-put');
            else btnAtual.classList.add('signal-wait');
        }
        
        // ENVIA SINAL PARA O CLIENTE (BroadcastChannel)
        try {
            const channel = new BroadcastChannel('signalpro');
            channel.postMessage({ type: 'SINAL', sinal: sinal, confianca: confianca, preco: precoAtual });
            channel.close();
        } catch(e) { console.log('Broadcast error:', e); }
    }
    
    function trocarPar(par) {
        parAtual = par;
        historicoPrecos = [];
        document.getElementById('currentPair').innerHTML = par;
        
        document.querySelectorAll('.pair-btn').forEach(btn => {
            btn.classList.remove('active');
            if(btn.getAttribute('data-par') === par) btn.classList.add('active');
        });
        
        // Reseta sinal
        document.getElementById('sinalM15').innerHTML = 'AGUARDANDO';
        document.getElementById('sinalM15').className = 'signal-value wait';
        document.getElementById('confidenceM15').style.width = '0%';
        document.getElementById('analise').innerHTML = 'Aguardando dados...';
    }
    
    function atualizarRelogio() {
        document.getElementById('currentTime').innerHTML = new Date().toLocaleTimeString('pt-BR');
    }
    
    // INICIAR
    atualizarRelogio();
    setInterval(atualizarRelogio, 1000);
    
    buscarPreco();
    intervalo = setInterval(buscarPreco, 5000);
</script>
</body>
</html>
